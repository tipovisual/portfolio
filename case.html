<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Study — Freddy Gonzalez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav id="navbar">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="work.html" class="active">Work</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle(); location.reload();" id="langBtn">ES</button></li>
    </ul>
  </nav>

  <main id="caseContent">
    <div class="container section-pad" style="padding-top:10rem; text-align:center;">
      <p class="mono" style="color:var(--muted)">Sincronizando con Supabase...</p>
    </div>
  </main>

  <footer>
    <div class="footer-logo">Freddy Gonzalez</div>
    <span class="footer-copy" id="t-copy">© 2024 Freddy Gonzalez. All rights reserved.</span>
  </footer>

  <script src="js/i18n.js"></script>
  <script type="module">
    import { supabase } from './js/supabase-config.js';

    async function renderProject() {
      const container = document.getElementById('caseContent');
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('id');
      const lang = Lang.current;

      if (!slug) { window.location.href = 'work.html'; return; }

      try {
        const { data: cs, error } = await supabase
          .from('portfolio_projects')
          .select('*')
          .eq('slug', slug)
          .single();

        if (error || !cs) throw new Error("Proyecto no encontrado");

        document.title = `${cs.title[lang]} — Freddy Gonzalez`;

        container.innerHTML = `
          <article class="container fade-up" style="padding-top: 8rem; padding-bottom: 8rem;">
            
            <!-- Botón Volver -->
            <a href="work.html" class="btn btn-ghost btn-sm" style="margin-bottom:3rem;">
              ← ${lang === 'es' ? 'Volver' : 'Back'}
            </a>

            <!-- Header -->
            <div class="section-label">${cs.category[lang] || 'Case Study'}</div>
            <h1 class="serif" style="font-size: clamp(3rem, 10vw, 5.5rem); line-height: 1; margin-bottom: 2rem;">
                ${cs.title[lang]}
            </h1>
            <p class="section-sub" style="font-size: 1.25rem; max-width: 800px; margin-bottom: 4rem;">
                ${cs.description[lang]}
            </p>

            <!-- Hero Image -->
            <div class="cs-hero" style="background-image: url('${cs.image_url}'); background-size: cover; background-position: center; height: 70vh; border-radius: 32px; border: 1px solid var(--border); margin-bottom: 5rem; display: flex; align-items: center; justify-content: center;">
                ${!cs.image_url ? `<span style="font-size: 6rem;">${cs.emoji}</span>` : ''}
            </div>

            <!-- Metadatos -->
            <div class="cs-meta" style="margin-bottom: 6rem;">
              <div class="cs-meta-item">
                <div class="cs-meta-label">ROLE</div>
                <div class="cs-meta-value">${cs.meta?.role || 'Designer'}</div>
              </div>
              <div class="cs-meta-item">
                <div class="cs-meta-label">YEAR</div>
                <div class="cs-meta-value">${new Date(cs.created_at).getFullYear()}</div>
              </div>
              <div class="cs-meta-item">
                <div class="cs-meta-label">TOOLS</div>
                <div class="cs-meta-value">${(cs.meta?.tools || []).join(', ')}</div>
              </div>
            </div>

            <!-- Narrativa del Caso -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 4rem; margin-top: 4rem;">
                
                <div class="cs-section">
                    <h2 class="serif" style="font-size: 2.2rem; margin-bottom: 1.5rem;">The Challenge</h2>
                    <p style="color: var(--muted); line-height: 1.8; font-size: 1.05rem;">
                        ${cs.content?.[lang]?.challenge || 'Content pending...'}
                    </p>
                </div>

                <div class="cs-section">
                    <h2 class="serif" style="font-size: 2.2rem; margin-bottom: 1.5rem;">The Solution</h2>
                    <p style="color: var(--muted); line-height: 1.8; font-size: 1.05rem;">
                        ${cs.content?.[lang]?.solution || 'Content pending...'}
                    </p>
                </div>

            </div>

            <!-- Footer del Caso -->
            <div style="margin-top: 8rem; padding-top: 4rem; border-top: 1px solid var(--border); text-align: center;">
                <p class="mono" style="font-size: 0.8rem; color: var(--muted); margin-bottom: 2rem;">¿QUIERES VER MÁS?</p>
                <a href="work.html" class="btn btn-primary">Back to Portfolio</a>
            </div>

          </article>
        `;

      } catch (err) {
        container.innerHTML = `<div style="text-align:center; padding: 10rem 0;">
            <h2 class="serif">Project not found</h2>
            <a href="work.html" class="btn btn-primary" style="margin-top: 2rem;">Return to Work</a>
        </div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', renderProject);
  </script>
</body>
</html>
