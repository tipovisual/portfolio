<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Work — Freddy Gonzalez</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" data-i18n="nav.home">Home</a></li>
      <li><a href="about.html" data-i18n="nav.about">About</a></li>
      <li><a href="work.html" class="active" data-i18n="nav.work">Work</a></li>
      <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle()" id="langBtn">ES</button></li>
    </ul>
  </nav>

  <main>
    <div class="container section-pad" style="padding-top:8rem">
      <div class="section-label" data-i18n="work.label">Trabajo Selecto</div>
      <h1 class="section-title" data-i18n="work.title">Casos de Estudio</h1>
      <div class="cases-grid" id="workGrid">
        <p class="mono" style="font-size:0.8rem;color:var(--muted)">Syncing database...</p>
      </div>
    </div>

    <!-- Tu sección de Insights mantenida intacta -->
    <section class="container section-pad" style="border-top:1px solid var(--border)">
      <div class="section-label" data-i18n="work.insightsLabel">Liderazgo & Procesos</div>
      <h2 class="section-title" data-i18n="work.insightsTitle">Internal Insights</h2>
      <div style="display:grid;gap:1.5rem;margin-top:3rem">
        <div class="insight-item">
          <div class="insight-header">
            <span class="tag-pill" data-i18n="work.i1_tag">Product Leadership</span>
            <span class="mono" style="font-size:0.7rem;color:var(--muted)">SQUAD MANAGEMENT</span>
          </div>
          <h3 class="serif" style="font-size:1.8rem;margin-bottom:1rem" data-i18n="work.i1_title">Optimizando el Hand-off</h3>
          <p data-i18n="work.i1_desc">Como Product Owner de un squad...</p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-logo">Freddy Gonzalez</div>
    <span class="footer-copy" data-i18n="footer.copy">© 2024 Freddy Gonzalez.</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/db.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    async function loadProjects() {
      const grid = document.getElementById('workGrid');
      
      // SOLUCIÓN DE RAÍZ
      if (typeof Lang === 'undefined' || typeof db === 'undefined') {
          setTimeout(loadProjects, 50);
          return;
      }

      const lang = Lang.current;
      try {
        const { data, error } = await db.from('portfolio_projects').select('*').order('created_at', { ascending: false });
        
        if (error) throw error;
        if (!data || data.length === 0) { grid.innerHTML = '<p style="color:var(--muted)">No projects yet.</p>'; return; }
        
        grid.innerHTML = data.map(cs => {
          const title = cs.title?.[lang] || cs.title?.es || '';
          const desc  = cs.description?.[lang] || cs.description?.es || '';
          const cat   = (cs.category?.[lang] || 'Case Study').toUpperCase();
          const img   = cs.image_url || '';
          return `
            <a href="case.html?id=${cs.slug}" class="case-card">
              <div class="case-img" style="${img ? `background-image:url('${img}');background-size:cover;background-position:center` : ''}">
                ${!img ? `<div class="case-emoji">${cs.emoji || '🎨'}</div>` : ''}
              </div>
              <div class="case-body">
                <div class="case-tag-label">${cat}</div>
                <div class="case-title">${title}</div>
                <div class="case-desc">${desc}</div>
              </div>
            </a>`;
        }).join('');
      } catch(e) {
        console.error('Supabase error:', e);
        grid.innerHTML = `<p style="color:var(--accent2)">Error: ${e.message}</p>`;
      }
    }

    loadProjects();
  </script>
</body>
</html>
