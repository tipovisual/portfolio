<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Study — Freddy Gonzalez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav id="navbar">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" id="t-home">Home</a></li>
      <li><a href="about.html" id="t-about">About</a></li>
      <li><a href="work.html" class="active" id="t-work">Work</a></li>
      <li><a href="contact.html" id="t-contact">Contact</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle()" id="langBtn">ES</button></li>
    </ul>
    <button class="nav-mobile-btn" onclick="toggleMenu()" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </nav>

  <main>
    <div class="container section-pad" style="padding-top:8rem" id="caseContent">
      <p style="color:var(--muted)">Loading project details...</p>
    </div>
  </main>

  <footer>
    <div class="footer-logo">Freddy Gonzalez</div>
    <span class="footer-copy" id="t-copy">© 2024 Freddy Gonzalez. All rights reserved.</span>
  </footer>

  <script src="js/i18n.js"></script>
  <script type="module">
    // 1. UI Básica
    function initUI() {
        document.getElementById('langBtn').textContent = Lang.current === 'en' ? 'ES' : 'EN';
        document.getElementById('t-home').textContent = Lang.get('nav.home');
        document.getElementById('t-about').textContent = Lang.get('nav.about');
        document.getElementById('t-work').textContent = Lang.get('nav.work');
        document.getElementById('t-contact').textContent = Lang.get('nav.contact');
        document.getElementById('t-copy').textContent = Lang.get('footer.copy');
    }

// 2. Carga del Proyecto desde Supabase
    async function loadCaseStudy() {
      const container = document.getElementById('caseContent');
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('id'); // Buscamos por el slug definido en la tabla

      // Importamos el cliente de Supabase desde tu nuevo archivo de configuración
      // Asegúrate de que la ruta sea correcta según tu estructura
      const { supabase } = await import('./js/supabase-config.js');

      try {
        // Consultamos la tabla en tu nuevo proyecto de Supabase
        const { data: cs, error } = await supabase
          .from('portfolio_projects')
          .select('*')
          .eq('slug', slug)
          .single();

        if (error || !cs) throw new Error("Proyecto no encontrado");
        
        const lang = Lang.current; // Usamos tu objeto Lang de i18n.js

        document.title = `${cs.title[lang]} — Freddy Gonzalez`;

        // Mantenemos exactamente tu misma estructura visual original
        container.innerHTML = `
          <div class="fade-up">
            <a href="work.html" class="btn btn-ghost btn-sm" style="margin-bottom:2rem; border-radius:100px;">
              ← ${lang === 'es' ? 'Volver a Work' : 'Back to Work'}
            </a>

            <div class="section-label">${cs.category[lang]}</div>
            <h1 class="section-title" style="font-size: clamp(2.5rem, 8vw, 4rem);">${cs.title[lang]}</h1>
            <p class="section-sub" style="margin-bottom:4rem; max-width:800px;">${cs.description[lang]}</p>

            <div class="cs-hero" style="aspect-ratio: 16/9; background: var(--surface2); border: 1px solid var(--border); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 8rem; margin-bottom: 4rem;">
              ${cs.emoji}
            </div>

            <div class="cs-meta">
              <div class="cs-meta-item">
                <div class="cs-meta-label">ROLE</div>
                <div class="cs-meta-value">${cs.meta.role}</div>
              </div>
              <div class="cs-meta-item">
                <div class="cs-meta-label">DURATION</div>
                <div class="cs-meta-value">${cs.meta.duration}</div>
              </div>
              <div class="cs-meta-item">
                <div class="cs-meta-label">TOOLS</div>
                <div class="cs-meta-value">${cs.meta.tools.join(', ')}</div>
              </div>
            </div>

            <div class="cs-content-grid">
              <div class="cs-section">
                <h2 class="section-title" style="font-size:2rem;">The Challenge</h2>
                <p class="section-sub">${cs.story.challenge[lang]}</p>
              </div>

              <div class="cs-section">
                <h2 class="section-title" style="font-size:2rem;">The Process</h2>
                <div class="process-steps">
                   <div class="step-item">
                     <h3 style="font-family:'Space Mono'; color:var(--accent); font-size:0.8rem; margin-bottom:1rem;">01. RESEARCH</h3>
                     <p>${cs.story.process.research.text[lang]}</p>
                   </div>
                   <div class="step-item">
                     <h3 style="font-family:'Space Mono'; color:var(--accent); font-size:0.8rem; margin-bottom:1rem;">02. IDEATION</h3>
                     <p>${cs.story.process.ideation.text[lang]}</p>
                   </div>
                   <div class="step-item">
                     <h3 style="font-family:'Space Mono'; color:var(--accent); font-size:0.8rem; margin-bottom:1rem;">03. DESIGN</h3>
                     <p>${cs.story.process.wireframes.text[lang]}</p>
                   </div>
                </div>
              </div>

              <div class="cs-section bg-surface" style="padding:3rem; border-radius:20px; border:1px solid var(--border);">
                <h2 class="section-title" style="font-size:2rem;">The Solution</h2>
                <p class="section-sub">${cs.story.solution[lang]}</p>
              </div>

              <div class="cs-section">
                <h2 class="section-title" style="font-size:2rem;">Results & Metrics</h2>
                <div class="metrics-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:1.5rem;">
                  ${cs.metrics.map(m => `
                    <div class="metric-card" style="background:var(--surface); padding:2rem; border-radius:15px; border:1px solid var(--border);">
                      <div class="metric-val" style="font-size:2.5rem; font-family:'DM Serif Display'; color:var(--white);">${m.value}</div>
                      <div class="metric-label" style="font-family:'Space Mono'; font-size:0.7rem; color:var(--muted);">${m.label[lang]}</div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>
        `;

      } catch (error) {
        console.error("Error cargando desde Supabase:", error);
        container.innerHTML = `<div class="container" style="text-align:center; padding:5rem 0;">
          <h2 class="section-title">Project not found</h2>
          <a href="work.html" class="btn btn-primary">Back to Work</a>
        </div>`;
      }
    }

    // Inicializar todo
    initUI();
    loadCaseStudy();

    window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
    });

    function toggleMenu() {
        document.getElementById('navLinks').classList.toggle('open');
    }
  </script>
</body>
</html>
