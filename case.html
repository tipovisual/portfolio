<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Detail — Freddy Gonzalez</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    /* Estilos Premium para Case Studies */
    .case-container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }
    .cs-header { padding-top: 12rem; margin-bottom: 5rem; text-align: left; }
    .cs-hero-img { width: 100%; height: auto; aspect-ratio: 16/9; border-radius: 32px; object-fit: cover; border: 1px solid var(--border); margin-bottom: 4rem; background: var(--surface2); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    
    /* Bloques de Contenido Dinámicos */
    .block-text { margin-bottom: 8rem; max-width: 850px; }
    .block-text h2 { font-size: 2.8rem; margin-bottom: 2rem; color: var(--white); font-family: 'DM Serif Display'; line-height: 1.1; }
    .block-text p { font-size: 1.2rem; color: var(--text-body); line-height: 1.8; margin-bottom: 1.5rem; }
    
    .block-image { margin: 8rem 0; border-radius: 24px; overflow: hidden; border: 1px solid var(--border); background: var(--surface2); }
    .block-image img { width: 100%; height: auto; display: block; }
    .block-image span { display: block; padding: 1.5rem; font-size: 0.9rem; color: var(--muted); font-family: 'Space Mono'; text-align: center; background: var(--surface); }

    .block-stat { display: inline-block; padding: 3rem; background: var(--surface); border-radius: 24px; border: 1px solid var(--border); border-top: 4px solid var(--accent); transition: transform 0.3s ease; margin-right: 2rem; margin-bottom: 2rem; min-width: 250px; }
    .stat-val { font-family: 'DM Serif Display'; font-size: 4rem; color: white; line-height: 1; margin-bottom: 0.5rem; }
    .stat-lab { font-family: 'Space Mono'; font-size: 0.8rem; color: var(--accent3); text-transform: uppercase; letter-spacing: 0.1em; }

    #error-display { display: none; padding: 20rem 2rem; text-align: center; color: var(--accent2); font-family: 'Space Mono'; }
    .loading-state { padding: 20rem 2rem; text-align: center; }
  </style>
</head>
<body>

  <nav id="navbar">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle(); location.reload();" id="langBtn">ES</button></li>
    </ul>
  </nav>

  <div id="error-display">
    <h2 class="serif">Case not found</h2>
    <p id="error-message"></p>
    <a href="work.html" class="btn btn-primary" style="margin-top: 2rem;">Return to Portfolio</a>
  </div>

  <main id="caseContent" class="case-container">
      <div class="loading-state">
          <p class="mono" id="status-text">Fetching project data...</p>
      </div>
  </main>

  <footer style="padding: 10rem 0 5rem; text-align: center; border-top: 1px solid var(--border); margin-top: 10rem;">
      <div class="footer-logo">Freddy Gonzalez</div>
      <p class="mono" style="font-size: 0.8rem; color: var(--muted); margin-top: 1rem;">© 2024 — Product Owner & Lead Designer</p>
  </footer>

  <!-- Cargamos i18n primero porque no es un módulo -->
  <script src="js/i18n.js"></script>

  <script type="module">
    // IMPORTAMOS LA BASE DE DATOS DIRECTAMENTE
    import { db } from './js/db.js';

    async function loadCase() {
        const container = document.getElementById('caseContent');
        const errorDisplay = document.getElementById('error-display');
        const errorMsg = document.getElementById('error-message');

        // Esperar a que Lang esté listo (polling ligero)
        if (!window.Lang) {
            setTimeout(loadCase, 50);
            return;
        }

        try {
            const lang = window.Lang.current;
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('id');

            if (!slug) { window.location.href = 'work.html'; return; }

            // Fetch de datos
            const { data: cs, error } = await db.from('portfolio_projects').select('*').eq('slug', slug).single();
            
            if (error) throw new Error(`Database: ${error.message}`);
            if (!cs) throw new Error("The project slug was not found.");

            // Procesamiento de Metadatos
            const title = cs.title?.[lang] || cs.title?.es || 'Untitled Project';
            const desc = cs.description?.[lang] || cs.description?.es || '';
            const role = cs.meta?.role || 'Lead Designer';
            const tools = Array.isArray(cs.meta?.tools) ? cs.meta.tools.join(', ') : (cs.meta?.tools || 'Figma');
            const mainImg = cs.image_url || '';

            document.title = `${title} — Freddy Gonzalez`;

            // Construcción del Layout Inicial
            let html = `
                <div class="cs-header fade-up">
                    <a href="work.html" class="btn btn-ghost" style="margin-bottom:3rem; padding: 0.5rem 1.2rem; font-size: 0.8rem;">← Back to Work</a>
                    <div class="section-label">${(cs.category?.[lang] || 'Case Study').toUpperCase()}</div>
                    <h1 class="serif" style="font-size:clamp(3.5rem, 8vw, 5.5rem); line-height:1; margin-bottom:2rem;">${title}</h1>
                    <p style="font-size:1.4rem; color:var(--text-body); max-width:800px; line-height:1.6;">${desc}</p>
                </div>
                
                ${mainImg ? `<img src="${mainImg}" class="cs-hero-img fade-up" alt="${title}">` : ''}

                <div class="fade-up" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:4rem; margin-bottom:10rem; border-bottom:1px solid var(--border); padding-bottom:5rem;">
                    <div><label class="section-label" style="font-size:0.6rem; color:var(--accent);">Role</label><div class="serif" style="font-size:1.4rem;">${role}</div></div>
                    <div><label class="section-label" style="font-size:0.6rem; color:var(--accent);">Tools</label><div class="serif" style="font-size:1.4rem;">${tools}</div></div>
                </div>
            `;

            // Renderizado de Bloques (SISTEMA CMS DINÁMICO)
            const blocks = cs.content?.blocks || [];
            
            if (blocks.length > 0) {
                blocks.forEach(block => {
                    if (block.type === 'text') {
                        html += `
                            <section class="block-text fade-up">
                                <h2>${block.title || ''}</h2>
                                <p>${block[lang] || block['es'] || ''}</p>
                            </section>`;
                    } else if (block.type === 'image' && block.url) {
                        html += `
                            <div class="block-image fade-up">
                                <img src="${block.url}" loading="lazy" alt="Wireframe/Mockup">
                                ${block.caption ? `<span>${block.caption}</span>` : ''}
                            </div>`;
                    } else if (block.type === 'stat') {
                        html += `
                            <div class="block-stat fade-up">
                                <div class="stat-val">${block.value}</div>
                                <div class="stat-lab">${lang === 'es' ? block.label_es : block.label_en}</div>
                            </div>`;
                    }
                });
            } else {
                // Fallback para proyectos sin bloques
                const challenge = cs.content?.[lang]?.challenge || cs.story?.challenge?.[lang] || '';
                const solution = cs.content?.[lang]?.solution || cs.story?.solution?.[lang] || '';
                if (challenge) html += `<section class="block-text fade-up"><h2>The Challenge</h2><p>${challenge}</p></section>`;
                if (solution) html += `<section class="block-text fade-up"><h2>The Solution</h2><p>${solution}</p></section>`;
            }

            container.innerHTML = html + `<div style="padding:10rem 0; text-align:center;"><a href="work.html" class="btn btn-primary">Browse more work</a></div>`;

        } catch (e) {
            console.error("Critical Error:", e);
            container.style.display = 'none';
            errorDisplay.style.display = 'block';
            errorMsg.innerText = e.message;
        }
    }

    // Ejecución inicial
    loadCase();
  </script>
</body>
</html>
