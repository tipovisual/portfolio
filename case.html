<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project — Freddy Gonzalez</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links">
      <li><a href="work.html">← Back to Work</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle(); location.reload();">ES</button></li>
    </ul>
  </nav>

  <main id="caseContent">
    <div class="container section-pad" style="padding-top:10rem; text-align:center;">
      <p class="mono">Loading project narrative...</p>
    </div>
  </main>

  <script type="module">
  import { supabase } from './js/supabase-config.js';

  async function renderCase() {
    if (!window.Lang) {
      setTimeout(renderCase, 100);
      return;
    }

    const container = document.getElementById('caseContent');
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('id');
    const lang = window.Lang.current;

    if (!slug) return;

    try {
      const { data: cs, error } = await supabase
        .from('portfolio_projects')
        .select('*')
        .eq('slug', slug)
        .single();

      if (error || !cs) throw new Error("Proyecto no encontrado");

      // Normalización de datos para que funcionen proyectos viejos y nuevos
      const challenge = cs.content?.[lang]?.challenge || cs.story?.challenge?.[lang] || "";
      const solution = cs.content?.[lang]?.solution || cs.story?.solution?.[lang] || "";
      const role = cs.meta?.role || "UX/UI Designer";
      const tools = Array.isArray(cs.meta?.tools) ? cs.meta.tools.join(', ') : "";

      container.innerHTML = `
        <div class="fade-up">
          <a href="work.html" class="btn btn-ghost btn-sm" style="margin-bottom:2rem;">
            ← ${lang === 'es' ? 'Volver' : 'Back'}
          </a>
          <div class="section-label">${cs.category[lang]}</div>
          <h1 class="section-title" style="font-size: clamp(2.5rem, 8vw, 4rem);">${cs.title[lang]}</h1>
          <p class="section-sub" style="margin-bottom:4rem; max-width:800px;">${cs.description[lang]}</p>

          <div class="cs-hero" style="background-image: url('${cs.image_url || ''}'); background-size: cover; background-position: center; aspect-ratio: 16/9; border-radius: 24px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin-bottom: 4rem;">
            ${!cs.image_url ? `<span style="font-size: 8rem;">${cs.emoji}</span>` : ''}
          </div>

          <div class="cs-meta">
            <div class="cs-meta-item">
              <div class="cs-meta-label">ROLE</div>
              <div class="cs-meta-value">${role}</div>
            </div>
            <div class="cs-meta-item">
              <div class="cs-meta-label">TOOLS</div>
              <div class="cs-meta-value">${tools}</div>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 4rem; margin-top: 4rem;">
            <div class="cs-section">
              <h2 class="section-title" style="font-size:2rem;">The Challenge</h2>
              <p class="section-sub">${challenge}</p>
            </div>
            <div class="cs-section">
              <h2 class="section-title" style="font-size:2rem;">The Solution</h2>
              <p class="section-sub">${solution}</p>
            </div>
          </div>
        </div>`;
    } catch (err) {
      console.error(err);
      container.innerHTML = `<h2>Project not found</h2>`;
    }
  }

  document.addEventListener('DOMContentLoaded', renderCase);
</script>
</body>
</html>
