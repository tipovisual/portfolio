<script type="module">
    import { supabase } from './js/supabase-config.js';

    async function renderProject() {
      const container = document.getElementById('caseContent');
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('id');
      const lang = Lang.current;

      if (!slug) { window.location.href = 'work.html'; return; }

      try {
        const { data: cs, error } = await supabase
          .from('portfolio_projects')
          .select('*')
          .eq('slug', slug)
          .single();

        if (error || !cs) throw new Error("Not found");

        // --- 1. PROCESAMIENTO DE DATOS (FUERA DEL HTML PARA EVITAR ERRORES) ---
        // Normalizamos los textos buscando en 'content' o 'story'
        const challengeText = cs.content?.[lang]?.challenge || cs.story?.challenge?.[lang] || "";
        const solutionText = cs.content?.[lang]?.solution || cs.story?.solution?.[lang] || "";
        
        // Normalizamos los metadatos
        const roleText = cs.meta?.role || "UX/UI Designer";
        const dateText = cs.meta?.duration || new Date(cs.created_at).getFullYear();
        
        // Manejo seguro del Array de Tools
        const toolsArray = Array.isArray(cs.meta?.tools) ? cs.meta.tools : [];
        const toolsText = toolsArray.join(', ');

        document.title = `${cs.title[lang]} — Freddy Gonzalez`;

        // --- 2. RENDERIZADO (USANDO VARIABLES YA LIMPIAS) ---
        container.innerHTML = `
          <article class="container fade-up" style="padding-top: 8rem; padding-bottom: 8rem;">
            <a href="work.html" class="btn btn-ghost btn-sm" style="margin-bottom:3rem;">
              ← ${lang === 'es' ? 'Volver' : 'Back'}
            </a>

            <div class="section-label">${cs.category[lang] || 'Case Study'}</div>
            <h1 class="serif" style="font-size: clamp(3rem, 10vw, 5.5rem); line-height: 1; margin-bottom: 2rem;">
                ${cs.title[lang]}
            </h1>
            <p class="section-sub" style="font-size: 1.25rem; max-width: 800px; margin-bottom: 4rem;">
                ${cs.description[lang]}
            </p>

            <div class="cs-hero" style="background-image: url('${cs.image_url}'); background-size: cover; background-position: center; height: 70vh; border-radius: 32px; border: 1px solid var(--border); margin-bottom: 5rem; display: flex; align-items: center; justify-content: center;">
                ${!cs.image_url ? `<span style="font-size: 6rem;">${cs.emoji}</span>` : ''}
            </div>

            <div class="cs-meta" style="margin-bottom: 6rem;">
              <div class="cs-meta-item">
                <div class="cs-meta-label">ROLE</div>
                <div class="cs-meta-value">${roleText}</div>
              </div>
              <div class="cs-meta-item">
                <div class="cs-meta-label">YEAR</div>
                <div class="cs-meta-value">${dateText}</div>
              </div>
              <div class="cs-meta-item">
                <div class="cs-meta-label">TOOLS</div>
                <div class="cs-meta-value">${toolsText}</div>
              </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 4rem;">
                ${challengeText ? `
                <div class="cs-section">
                    <h2 class="serif" style="font-size: 2.2rem; margin-bottom: 1.5rem;">The Challenge</h2>
                    <p style="color: var(--muted); line-height: 1.8;">${challengeText}</p>
                </div>` : ''}

                ${solutionText ? `
                <div class="cs-section">
                    <h2 class="serif" style="font-size: 2.2rem; margin-bottom: 1.5rem;">The Solution</h2>
                    <p style="color: var(--muted); line-height: 1.8;">${solutionText}</p>
                </div>` : ''}
            </div>

            <div style="margin-top: 8rem; padding-top: 4rem; border-top: 1px solid var(--border); text-align: center;">
                <a href="work.html" class="btn btn-primary">Back to Portfolio</a>
            </div>
          </article>
        `;

      } catch (err) {
        container.innerHTML = `<div style="text-align:center; padding: 10rem 0;"><h2>Project not found</h2></div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', renderProject);
</script>
