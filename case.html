<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin Builder — Freddy Gonzalez</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-container { max-width: 800px; margin: 0 auto; padding: 100px 2rem; }
    .block-editor { background: var(--surface2); padding: 2rem; border-radius: 20px; margin-bottom: 2rem; border: 1px solid var(--border); }
    .btn-add { background: var(--accent); color: white; padding: 0.8rem 1.5rem; border-radius: 10px; cursor: pointer; border: none; margin-right: 1rem; }
    input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; }
    .loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
  </style>
</head>
<body>
  <div id="loader" class="loading">SYNCING DATA...</div>
  <div class="admin-container">
    <h2 class="serif" style="margin-bottom: 2rem;">New Case Study Builder</h2>
    <form id="mainForm">
      <div class="block-editor">
        <label class="section-label">General Info</label>
        <input type="text" id="title_es" placeholder="Título (ES)" required>
        <input type="text" id="title_en" placeholder="Title (EN)" required>
        <input type="text" id="slug" placeholder="slug-del-proyecto" required>
        <input type="file" id="cover" accept="image/*">
      </div>

      <div id="blocks"></div>

      <div style="margin-bottom: 4rem;">
        <button type="button" class="btn-add" onclick="addText()">+ Add Text Block</button>
        <button type="button" class="btn-add" onclick="addImage()" style="background:var(--accent3); color:black;">+ Add Image/Wireframe</button>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; padding: 1.5rem;">DEPLOY PROJECT</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/db.js"></script>
  <script>
    let blockCount = 0;

    function addText() {
        const id = blockCount++;
        const html = `
            <div class="block-editor" id="b-${id}" data-type="text">
                <label class="section-label">Text Block</label>
                <input type="text" class="b-title" placeholder="Sub-título (ej: El Reto)">
                <textarea class="b-es" placeholder="Contenido ES" rows="4"></textarea>
                <textarea class="b-en" placeholder="Content EN" rows="4"></textarea>
                <button type="button" onclick="this.parentElement.remove()">Remove</button>
            </div>`;
        document.getElementById('blocks').insertAdjacentHTML('beforeend', html);
    }

    function addImage() {
        const id = blockCount++;
        const html = `
            <div class="block-editor" id="b-${id}" data-type="image">
                <label class="section-label">Visual Block (Wireframe/Flow)</label>
                <input type="file" class="b-file" accept="image/*">
                <input type="text" class="b-caption" placeholder="Pie de foto">
                <button type="button" onclick="this.parentElement.remove()">Remove</button>
            </div>`;
        document.getElementById('blocks').insertAdjacentHTML('beforeend', html);
    }

    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loader').style.display = 'flex';

        try {
            // 1. Cover
            let coverUrl = '';
            const cFile = document.getElementById('cover').files[0];
            if(cFile) {
                const name = `covers/${Date.now()}-${cFile.name}`;
                await db.storage.from('projects').upload(name, cFile);
                coverUrl = db.storage.from('projects').getPublicUrl(name).data.publicUrl;
            }

            // 2. Bloques
            const blocks = [];
            const blockElems = document.querySelectorAll('.block-editor[data-type]');
            for(let el of blockElems) {
                const type = el.dataset.type;
                if(type === 'text') {
                    blocks.push({ type, title: el.querySelector('.b-title').value, es: el.querySelector('.b-es').value, en: el.querySelector('.b-en').value });
                } else {
                    const f = el.querySelector('.b-file').files[0];
                    if(f) {
                        const n = `gallery/${Date.now()}-${f.name}`;
                        await db.storage.from('projects').upload(n, f);
                        const url = db.storage.from('projects').getPublicUrl(n).data.publicUrl;
                        blocks.push({ type, url, caption: el.querySelector('.b-caption').value });
                    }
                }
            }

            await db.from('portfolio_projects').insert([{
                slug: document.getElementById('slug').value,
                image_url: coverUrl,
                title: { es: document.getElementById('title_es').value, en: document.getElementById('title_en').value },
                content: { blocks }
            }]);

            alert("Done!");
            location.reload();
        } catch(e) { alert(e.message); }
    }
  </script>
</body>
</html>
