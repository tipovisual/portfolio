<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project — Freddy Gonzalez</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links">
      <li><a href="work.html">← Back to Work</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle(); location.reload();">ES</button></li>
    </ul>
  </nav>

  <main id="caseContent">
    <div class="container section-pad" style="padding-top:10rem; text-align:center;">
      <p class="mono">Loading project narrative...</p>
    </div>
  </main>

  <script type="module">
  import { supabase } from './js/supabase-config.js';

async function loadCase() {
    const container = document.getElementById('caseContent');
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('id');
    
    if (!slug) return console.error("No se encontró el slug en la URL");

    try {
        const { data: cs, error } = await supabase
            .from('portfolio_projects')
            .select('*')
            .eq('slug', slug)
            .single();

        if (error || !cs) throw new Error("Proyecto no encontrado en la base de datos");

        const lang = (window.Lang && window.Lang.current) ? window.Lang.current : 'es';
        
        // Capa de compatibilidad (Puente entre datos viejos y nuevos)
        const challenge = cs.content?.[lang]?.challenge || cs.story?.challenge?.[lang] || "";
        const solution = cs.content?.[lang]?.solution || cs.story?.solution?.[lang] || "";
        const role = cs.meta?.role || "UX/UI Designer";
        const tools = Array.isArray(cs.meta?.tools) ? cs.meta.tools.join(', ') : (cs.meta?.tools || "");
        const img = cs.image_url || cs.meta?.cover || "";

        container.innerHTML = `
            <div class="container fade-up" style="padding-top: 8rem;">
                <a href="work.html" class="btn btn-ghost" style="margin-bottom:2rem;">← Volver</a>
                <h1 class="serif" style="font-size:3.5rem; margin-bottom:1rem;">${cs.title[lang]}</h1>
                <p style="color:var(--muted); font-size:1.2rem; margin-bottom:3rem;">${cs.description[lang]}</p>
                
                <div class="cs-hero" style="background:url('${img}') center/cover; height:60vh; border-radius:24px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; margin-bottom:4rem;">
                    ${!img ? `<span style="font-size:6rem">${cs.emoji}</span>` : ''}
                </div>

                <div class="cs-meta" style="display:flex; gap:3rem; margin-bottom:4rem;">
                    <div><label style="display:block; color:var(--accent); font-family:'Space Mono'; font-size:0.7rem;">ROLE</label><strong>${role}</strong></div>
                    <div><label style="display:block; color:var(--accent); font-family:'Space Mono'; font-size:0.7rem;">TOOLS</label><strong>${tools}</strong></div>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:4rem;">
                    <div><h2 class="serif">The Challenge</h2><p style="color:var(--muted); line-height:1.7;">${challenge}</p></div>
                    <div><h2 class="serif">The Solution</h2><p style="color:var(--muted); line-height:1.7;">${solution}</p></div>
                </div>
            </div>`;
            
    } catch (err) {
        console.error("Error cargando detalle:", err.message);
        if(container) container.innerHTML = `<h2>Error: ${err.message}</h2>`;
    }
}

loadCase();
</script>
</body>
</html>
