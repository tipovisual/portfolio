<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freddy Gonzalez — UX/UI Designer</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" class="active" id="t-home">Home</a></li>
      <li><a href="about.html" id="t-about">About</a></li>
      <li><a href="work.html" id="t-work">Work</a></li>
      <li><a href="contact.html" id="t-contact">Contact</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle(); location.reload();" id="langBtn">ES</button></li>
    </ul>
  </nav>

  <main>
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-content">
        <div class="hero-tag fade-up" id="t-hero-tag">Available for new projects</div>
        <h1 class="fade-up d1">Designing<br><em>experiences</em><br>that matter</h1>
        <p class="hero-sub fade-up d2" id="t-hero-sub">Crafting intuitive and accessible products.</p>
        <div class="hero-actions fade-up d3">
          <a href="work.html" class="btn btn-primary" id="t-hero-cta">View My Work</a>
        </div>
      </div>
    </section>

    <div class="bg-surface">
      <div class="container section-pad">
        <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:3rem;flex-wrap:wrap;gap:1rem">
          <div>
            <div class="section-label" id="t-work-label">Selected Work</div>
            <h2 class="section-title" id="t-work-title">Case Studies</h2>
          </div>
          <a href="work.html" class="btn btn-ghost" id="t-view-all">View All Work →</a>
        </div>
        <div class="cases-grid" id="workGrid"></div>
      </div>
    </div>
  </main>

  <script src="js/i18n.js"></script>
  <script type="module">
    import { supabase } from './js/supabase-config.js';

    async function render() {
      console.log("Iniciando carga de Supabase...");
      const grid = document.getElementById('workGrid');
      const lang = (window.Lang && window.Lang.current) ? window.Lang.current : 'es';

      try {
        const { data, error } = await supabase
          .from('portfolio_projects')
          .select('*')
          .order('created_at', { ascending: false })
          .limit(2);

        if (error) throw error;

        grid.innerHTML = data.map(cs => {
          const t = cs.title?.[lang] || cs.title?.['es'] || 'Untitled';
          const d = cs.description?.[lang] || cs.description?.['es'] || '';
          const img = cs.image_url || cs.meta?.cover || '';
          const cat = (cs.category?.[lang] || cs.category?.['es'] || 'UX/UI').toUpperCase();

          return `
            <a href="case.html?id=${cs.slug}" class="case-card">
              <div class="case-img" style="${img ? `background-image:url('${img}');background-size:cover;` : 'background:var(--surface2)'}">
                ${!img ? `<div class="case-emoji">${cs.emoji || '🎨'}</div>` : ''}
              </div>
              <div class="case-body">
                <div class="case-tag-label">${cat}</div>
                <div class="case-title">${t}</div>
                <div class="case-desc">${d}</div>
              </div>
            </a>`;
        }).join('');
      } catch (e) {
        console.error("Error detallado:", e);
        grid.innerHTML = `<p>Error al cargar proyectos.</p>`;
      }
    }
    render();
  </script>
</body>
</html>
