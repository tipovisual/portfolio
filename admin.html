<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Builder — Freddy Gonzalez</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root { --admin-accent: #7c6af7; --admin-bg: #0a0a0f; }
    .admin-wrap { display: none; padding: 100px 2rem; background: var(--admin-bg); min-height: 100vh; }
    .admin-container { max-width: 900px; margin: 0 auto; }
    .admin-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; margin-bottom: 2rem; }
    .form-section-label { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent3); text-transform: uppercase; letter-spacing: 0.1em; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); margin: 1.5rem 0 1rem; }
    
    /* Case Builder Styles */
    .block-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; position: relative; animation: fadeIn 0.3s ease; }
    .block-type-tag { position: absolute; top: -10px; right: 20px; background: var(--accent); color: white; font-size: 0.6rem; padding: 2px 10px; border-radius: 10px; font-family: 'Space Mono'; }
    .btn-add-block { background: rgba(124,106,247,0.1); border: 1px dashed var(--accent); color: var(--accent); padding: 1rem; width: 100%; border-radius: 12px; cursor: pointer; margin-bottom: 1rem; transition: 0.2s; }
    .btn-add-block:hover { background: rgba(124,106,247,0.2); }
    .remove-block { color: var(--accent2); cursor: pointer; font-size: 0.7rem; text-transform: uppercase; margin-top: 1rem; display: block; }
    
    input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 0.8rem; border-radius: 8px; font-family: 'DM Sans'; margin-bottom: 0.5rem; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; color: var(--accent3); font-family: 'Space Mono'; }
  </style>
</head>
<body>

  <div id="loading" class="loading-overlay">BUILDING CASE STUDY IN DATABASE...</div>

  <!-- LOGIN (Simplificado para este ejemplo, usa tu lógica de pass) -->
  <div class="login-wrap" id="loginWrap" style="display:flex; justify-content:center; align-items:center; height:100vh;">
      <div class="admin-panel" style="width:350px; text-align:center;">
          <h3 class="serif">Admin Access</h3>
          <input type="password" id="passInput" placeholder="Password">
          <button class="btn btn-primary" onclick="checkPass()" style="width:100%; justify-content:center; margin-top:1rem;">Unlock</button>
      </div>
  </div>

  <div class="admin-wrap" id="adminWrap">
    <div class="admin-container">
      <nav style="display:flex; justify-content:space-between; margin-bottom:3rem; align-items:center;">
          <h2 class="serif">Case Builder</h2>
          <button class="lang-btn" onclick="location.reload()">Exit</button>
      </nav>

      <form id="builderForm">
        <div class="admin-panel">
          <div class="form-section-label">1. Basic Info</div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
              <input type="text" id="t_es" placeholder="Title (ES)" required>
              <input type="text" id="t_en" placeholder="Title (EN)" required>
              <input type="text" id="slug" placeholder="slug-del-proyecto" required>
              <input type="text" id="emoji" placeholder="Emoji (ej: 🚀)">
          </div>
          <textarea id="d_es" placeholder="Brief summary (ES)" rows="2" style="margin-top:1rem;"></textarea>
          <textarea id="d_en" placeholder="Brief summary (EN)" rows="2"></textarea>
          <label class="section-label" style="font-size:0.6rem; margin-top:1rem;">Cover Image</label>
          <input type="file" id="coverInput" accept="image/*">
        </div>

        <div class="admin-panel">
          <div class="form-section-label">2. Visual Meta</div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
              <input type="text" id="role" placeholder="Role (e.g. Product Owner)">
              <input type="text" id="tools" placeholder="Tools (comma separated)">
          </div>
        </div>

        <div class="form-section-label">3. Content Blocks (The Story)</div>
        <div id="blocksContainer">
            <!-- Bloques se añaden aquí -->
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:1rem;">
            <button type="button" class="btn-add-block" onclick="addBlock('text')">+ Add Text Block</button>
            <button type="button" class="btn-add-block" onclick="addBlock('image')">+ Add Visual Asset</button>
            <button type="button" class="btn-add-block" onclick="addBlock('stat')">+ Add Metric Card</button>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:4rem; justify-content:center; padding:1.5rem; font-size:1.1rem;">
            Deploy Dynamic Case Study
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/db.js"></script>
  <script>
    function checkPass() {
        if(document.getElementById('passInput').value === 'freddy2024') {
            document.getElementById('loginWrap').style.display = 'none';
            document.getElementById('adminWrap').style.display = 'block';
        }
    }

    function addBlock(type) {
        const id = Date.now();
        const container = document.getElementById('blocksContainer');
        const div = document.createElement('div');
        div.className = 'block-item';
        div.dataset.type = type;
        div.id = `block-${id}`;

        let html = `<span class="block-type-tag">${type.toUpperCase()}</span>`;
        if(type === 'text') {
            html += `<input type="text" class="b-title" placeholder="Block Title (ej: The Research)">
                     <textarea class="b-es" placeholder="Content (ES)" rows="4"></textarea>
                     <textarea class="b-en" placeholder="Content (EN)" rows="4"></textarea>`;
        } else if(type === 'image') {
            html += `<label>Upload Image (Diagram, Wireframe, Mockup)</label>
                     <input type="file" class="b-file" accept="image/*">
                     <input type="text" class="b-cap" placeholder="Caption / Description">`;
        } else if(type === 'stat') {
            html += `<div style="display:grid; grid-template-columns: 1fr 2fr; gap:1rem;">
                        <input type="text" class="b-val" placeholder="Value (ej: +45%)">
                        <input type="text" class="b-lab-es" placeholder="Label ES (ej: Conversión)">
                     </div>
                     <input type="text" class="b-lab-en" placeholder="Label EN (ej: Conversion)">`;
        }
        html += `<span class="remove-block" onclick="document.getElementById('block-${id}').remove()">✕ Remove Block</span>`;
        div.innerHTML = html;
        container.appendChild(div);
    }

    document.getElementById('builderForm').onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loading').style.display = 'flex';

        try {
            // 1. Cover
            let coverUrl = '';
            const cFile = document.getElementById('coverInput').files[0];
            if(cFile) {
                const name = `covers/${Date.now()}-${cFile.name}`;
                await db.storage.from('projects').upload(name, cFile);
                coverUrl = db.storage.from('projects').getPublicUrl(name).data.publicUrl;
            }

            // 2. Procesar Bloques
            const blocks = [];
            const blockElems = document.querySelectorAll('.block-item');

            for(let el of blockElems) {
                const type = el.dataset.type;
                let data = { type };

                if(type === 'text') {
                    data.title = el.querySelector('.b-title').value;
                    data.es = el.querySelector('.b-es').value;
                    data.en = el.querySelector('.b-en').value;
                } else if(type === 'image') {
                    const file = el.querySelector('.b-file').files[0];
                    if(file) {
                        const name = `gallery/${Date.now()}-${file.name}`;
                        await db.storage.from('projects').upload(name, file);
                        data.url = db.storage.from('projects').getPublicUrl(name).data.publicUrl;
                        data.caption = el.querySelector('.b-cap').value;
                    }
                } else if(type === 'stat') {
                    data.value = el.querySelector('.b-val').value;
                    data.label_es = el.querySelector('.b-lab-es').value;
                    data.label_en = el.querySelector('.b-lab-en').value;
                }
                blocks.push(data);
            }

            const projectData = {
                slug: document.getElementById('slug').value,
                emoji: document.getElementById('emoji').value || '💼',
                image_url: coverUrl,
                title: { es: document.getElementById('t_es').value, en: document.getElementById('t_en').value },
                description: { es: document.getElementById('d_es').value, en: document.getElementById('d_en').value },
                meta: { role: document.getElementById('role').value, tools: document.getElementById('tools').value.split(',') },
                content: { blocks } // AQUÍ SE GUARDA TODO EL BUILDER
            };

            const { error } = await db.from('portfolio_projects').insert([projectData]);
            if(error) throw error;
            alert("Case Study Deployed!");
            location.reload();

        } catch(err) { alert(err.message); }
        finally { document.getElementById('loading').style.display = 'none'; }
    };
  </script>
</body>
</html>
