<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Freddy Gonzalez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Mantenemos tu estética de Login */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
    .login-card { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 3rem; width: 100%; max-width: 420px; z-index: 10; }
    
    .admin-wrap { display: none; padding-top: 80px; }
    .admin-inner { max-width: 1000px; margin: 0 auto; padding: 2rem; }
    
    /* Mejoras al formulario de Supabase */
    .admin-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; margin-bottom: 2rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .full-width { grid-column: span 2; }
    
    .project-list-item { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 1rem; background: var(--surface); border: 1px solid var(--border); 
      border-radius: 12px; margin-bottom: 0.5rem; 
    }
    .preview-img-tag { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-top: 1rem; display: none; border: 1px solid var(--border); }
    
    label { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent); margin-bottom: 0.5rem; display: block; }
    input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; }
  </style>
</head>
<body>

  <!-- LOGIN SECTION -->
  <div class="login-wrap" id="loginWrap">
    <div class="hero-bg"></div>
    <div class="login-card fade-up">
      <div class="footer-logo" style="font-size: 1.5rem; margin-bottom: 1rem;">Freddy Gonzalez</div>
      <p style="color:var(--muted); font-size:0.8rem; margin-bottom:2rem;">DATABASE ACCESS</p>
      <form id="loginForm">
        <input type="password" id="passInput" placeholder="Password" required>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center">Unlock Dashboard</button>
      </form>
    </div>
  </div>

  <!-- ADMIN SECTION -->
  <div class="admin-wrap" id="adminWrap">
    <nav id="navbar">
        <span class="nav-logo">Freddy Admin</span>
        <button class="lang-btn" onclick="location.reload()">Logout</button>
    </nav>

    <div class="admin-inner">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
          <h2 class="serif">Manage Projects</h2>
          <button class="btn btn-primary btn-sm" onclick="document.getElementById('projectForm').scrollIntoView()">+ New Project</button>
      </div>

      <!-- LIST OF PROJECTS FROM SUPABASE -->
      <div id="projectsList" style="margin-bottom: 4rem;">
        <p class="mono" style="font-size:0.8rem; color:var(--muted)">Loading projects from Supabase...</p>
      </div>

      <!-- FORM TO ADD -->
      <div class="admin-panel" id="projectFormContainer">
        <h3 class="serif" style="margin-bottom:1.5rem">Add New Case Study</h3>
        <form id="projectForm">
            <div class="form-grid">
                <div>
                    <label>Title (ES)</label>
                    <input type="text" id="t_es" placeholder="Ej: Educastic" required>
                </div>
                <div>
                    <label>Title (EN)</label>
                    <input type="text" id="t_en" placeholder="Ej: Educastic" required>
                </div>
                <div>
                    <label>Slug</label>
                    <input type="text" id="slug" placeholder="educastic-ux" required>
                </div>
                <div>
                    <label>Emoji</label>
                    <input type="text" id="emoji" placeholder="🚀">
                </div>
                <div class="full-width">
                    <label>Description (ES)</label>
                    <textarea id="d_es" rows="2"></textarea>
                </div>
                <div class="full-width">
                    <label>Description (EN)</label>
                    <textarea id="d_en" rows="2"></textarea>
                </div>
                <div class="full-width">
                    <label>Featured Image (Cover)</label>
                    <input type="file" id="fileInput" accept="image/*">
                    <img id="imgPreview" class="preview-img-tag">
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="saveBtn" style="margin-top:2rem; width:100%; justify-content:center">Save to Cloud Database</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase-config.js';

    const ADMIN_PASS = 'freddy2024';
    const loginForm = document.getElementById('loginForm');
    const projectForm = document.getElementById('projectForm');
    const fileInput = document.getElementById('fileInput');
    const imgPreview = document.getElementById('imgPreview');

    // 1. LOGIN LOGIC
    loginForm.onsubmit = (e) => {
        e.preventDefault();
        if (document.getElementById('passInput').value === ADMIN_PASS) {
            document.getElementById('loginWrap').style.display = 'none';
            document.getElementById('adminWrap').style.display = 'block';
            fetchProjects();
        } else {
            alert("Wrong password");
        }
    };

    // 2. IMAGE PREVIEW
    fileInput.onchange = () => {
        const [file] = fileInput.files;
        if (file) {
            imgPreview.src = URL.createObjectURL(file);
            imgPreview.style.display = 'block';
        }
    };

    // 3. FETCH PROJECTS FROM SUPABASE
    async function fetchProjects() {
        const listDiv = document.getElementById('projectsList');
        const { data, error } = await supabase
            .from('portfolio_projects')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return listDiv.innerHTML = "Error loading projects.";

        listDiv.innerHTML = data.map(p => `
            <div class="project-list-item">
                <div>
                    <span style="margin-right:10px">${p.emoji}</span>
                    <strong class="mono" style="font-size:0.9rem">${p.title.es}</strong>
                    <div style="font-size:0.7rem; color:var(--muted)">slug: ${p.slug}</div>
                </div>
                <button class="btn-icon" onclick="deleteProject('${p.id}')" style="color:var(--accent2); border-color:rgba(247,124,106,0.2)">✕</button>
            </div>
        `).join('');
    }

    // 4. SAVE TO SUPABASE (Storage + DB)
    projectForm.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.textContent = "Processing...";

        try {
            let imageUrl = '';
            const file = fileInput.files[0];

            if (file) {
                const fileName = `${Date.now()}-${file.name}`;
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('projects')
                    .upload(`covers/${fileName}`, file);
                
                if (uploadError) throw uploadError;
                
                const { data: publicUrlData } = supabase.storage
                    .from('projects')
                    .getPublicUrl(`covers/${fileName}`);
                
                imageUrl = publicUrlData.publicUrl;
            }

            const { error } = await supabase.from('portfolio_projects').insert([{
                slug: document.getElementById('slug').value,
                emoji: document.getElementById('emoji').value,
                image_url: imageUrl,
                title: { es: document.getElementById('t_es').value, en: document.getElementById('t_en').value },
                description: { es: document.getElementById('d_es').value, en: document.getElementById('d_en').value },
                category: { es: "Case Study", en: "Case Study" }
            }]);

            if (error) throw error;

            alert("Project Live!");
            projectForm.reset();
            imgPreview.style.display = 'none';
            fetchProjects();

        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = "Save to Cloud Database";
        }
    };

    // Global delete function
    window.deleteProject = async (id) => {
        if (!confirm("Delete this project?")) return;
        const { error } = await supabase.from('portfolio_projects').delete().eq('id', id);
        if (!error) fetchProjects();
    };

  </script>
</body>
</html>
