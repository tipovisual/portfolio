<script type="module">
  import { supabase } from './js/supabase-config.js';

  // 1. Traducciones y UI Inicial (Se mantiene igual)
  function initUI() {
      document.getElementById('langBtn').textContent = Lang.current === 'en' ? 'ES' : 'EN';
      document.getElementById('t-home').textContent = Lang.get('nav.home');
      document.getElementById('t-about').textContent = Lang.get('nav.about');
      document.getElementById('t-work').textContent = Lang.get('nav.work');
      document.getElementById('t-contact').textContent = Lang.get('nav.contact');
      document.getElementById('t-label').textContent = Lang.get('work.label');
      document.getElementById('t-title').textContent = Lang.get('work.title');
      document.getElementById('t-sub').textContent = Lang.get('work.sub');
      document.getElementById('t-copy').textContent = Lang.get('footer.copy');
  }

  // 2. Motor Dinámico con Supabase (Formato Original Preservado)
  async function renderWorkGrid() {
      const grid = document.getElementById('workGrid');
      const lang = Lang.current;
      
      try {
          // Consultamos todos los proyectos en Supabase
          const { data: projects, error } = await supabase
            .from('portfolio_projects')
            .select('*')
            .order('created_at', { ascending: false });

          if (error) throw error;
          grid.innerHTML = ''; 

          projects.forEach(cs => {
              // Mantenemos tu estructura HTML exacta de work.html
              const card = document.createElement('a');
              card.href = `case.html?id=${cs.slug}`;
              card.className = 'case-card';
              
              // Los tags los sacamos del campo 'meta' o 'tags' si los tienes
              const tags = cs.meta?.tools || []; 

              card.innerHTML = `
                  <div class="case-img">
                      <div>
                          <div class="case-emoji">${cs.emoji}</div>
                          <div class="case-cat-small">${cs.category[lang].toUpperCase()}</div>
                      </div>
                  </div>
                  <div class="case-body">
                      <div class="case-tag-label">${cs.category[lang]}</div>
                      <div class="case-title">${cs.title[lang]}</div>
                      <div class="case-desc">${cs.description[lang]}</div>
                      <div class="case-footer">
                          <div class="case-tags">
                              ${tags.slice(0,2).map(t => `<span class="tag-pill">${t}</span>`).join('')}
                          </div>
                          <div class="case-arrow">
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                  <path d="M5 12h14M12 5l7 7-7 7"/>
                              </svg>
                          </div>
                      </div>
                  </div>`;
              grid.appendChild(card);
          });
      } catch (error) {
          console.error("Error en Work Supabase:", error);
          grid.innerHTML = `<p style="color:var(--muted)">No se pudieron cargar los proyectos.</p>`;
      }
  }

  // Ejecutar
  initUI();
  renderWorkGrid();

  // Navegación y Menú (Se mantienen igual)
  window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
  });
  function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
  }
</script>
