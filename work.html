<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work — Freddy Gonzalez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav id="navbar">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" id="t-home">Home</a></li>
      <li><a href="about.html" id="t-about">About</a></li>
      <li><a href="work.html" class="active" id="t-work">Work</a></li>
      <li><a href="contact.html" id="t-contact">Contact</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle()" id="langBtn">ES</button></li>
    </ul>
    <button class="nav-mobile-btn" onclick="toggleMenu()" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </nav>

  <main>
    <div class="container section-pad" style="padding-top:8rem">
      <div class="section-label" id="t-label">Selected Work</div>
      <h1 class="section-title" id="t-title">Case Studies</h1>
      <p class="section-sub" style="margin-bottom:3rem;max-width:600px" id="t-sub">Selected projects that showcase my design process</p>
      <div class="cases-grid" id="workGrid"></div>
    </div>
  </main>

  <footer>
    <div class="footer-logo">Freddy Gonzalez</div>
    <span class="footer-copy" id="t-copy">© 2024 Freddy Gonzalez. All rights reserved.</span>
    <div class="footer-social">
      <a href="https://linkedin.com/in/freddy-gonzalez-13a13a3a/" target="_blank" class="social-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      </a>
      <a href="mailto:tipovisual@gmail.com" class="social-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </a>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    document.getElementById('langBtn').textContent = Lang.current === 'en' ? 'ES' : 'EN';
    document.getElementById('t-home').textContent = Lang.get('nav.home');
    document.getElementById('t-about').textContent = Lang.get('nav.about');
    document.getElementById('t-work').textContent = Lang.get('nav.work');
    document.getElementById('t-contact').textContent = Lang.get('nav.contact');
    document.getElementById('t-label').textContent = Lang.get('work.label');
    document.getElementById('t-title').textContent = Lang.get('work.title');
    document.getElementById('t-sub').textContent = Lang.get('work.sub');
    document.getElementById('t-copy').textContent = Lang.get('footer.copy');

    const grid = document.getElementById('workGrid');
    caseStudies.forEach((cs, i) => {
      const title = Lang.cs(cs, 'title');
      const cat = Lang.cs(cs, 'category');
      const desc = Lang.cs(cs, 'description');
      const card = document.createElement('a');
      card.href = `case.html?id=${cs.id}`;
      card.className = `case-card${i === 0 ? ' featured' : ''}`;
      card.innerHTML = `
        <div class="case-img">
          <div>
            <div class="case-emoji">${cs.emoji}</div>
            <div class="case-cat-small">${cat.toUpperCase()}</div>
          </div>
        </div>
        <div class="case-body">
          <div class="case-tag-label">${cat}</div>
          <div class="case-title">${title}</div>
          <div class="case-desc">${desc}</div>
          <div class="case-footer">
            <div class="case-tags">${cs.tags.slice(0,2).map(t=>`<span class="tag-pill">${t}</span>`).join('')}</div>
            <div class="case-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
          </div>
        </div>`;
      grid.appendChild(card);
    });

    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
    });
    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
    }
  </script>
</body>
</html>
