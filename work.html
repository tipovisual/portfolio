<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work — Freddy Gonzalez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" id="t-home">Home</a></li>
      <li><a href="about.html" id="t-about">About</a></li>
      <li><a href="work.html" class="active" id="t-work">Work</a></li>
      <li><a href="contact.html" id="t-contact">Contact</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle()" id="langBtn">ES</button></li>
    </ul>
  </nav>

  <main class="container section-pad">
    <div class="section-label" id="t-label">Work</div>
    <h1 class="section-title" id="t-title">Portfolio</h1>
    <p class="section-sub" id="t-sub">A collection of projects focused on solving complex problems.</p>
    <div class="cases-grid" id="workGrid" style="margin-top:4rem"></div>
  </main>

  <script src="js/i18n.js"></script>
  <script type="module">
    import { supabase } from './js/supabase-config.js';

    async function renderWorkGrid() {
        const grid = document.getElementById('workGrid');
        if (!grid) return;

        const i18n = window.Lang;
        if (!i18n) { setTimeout(renderWorkGrid, 50); return; }
        const lang = i18n.current;
        
        try {
            const { data: projects, error } = await supabase
                .from('portfolio_projects')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;
            grid.innerHTML = '';

            projects.forEach(cs => {
                const title = cs.title[lang] || cs.title['es'] || 'Untitled';
                const desc = cs.description[lang] || cs.description['es'] || '';
                const cat = (cs.category?.[lang] || cs.category?.['es'] || 'Case Study').toUpperCase();
                const imgUrl = cs.image_url || cs.meta?.cover || "";

                const card = document.createElement('a');
                card.href = `case.html?id=${cs.slug}`;
                card.className = 'case-card';
                card.innerHTML = `
                    <div class="case-img" style="${imgUrl ? `background-image: url('${imgUrl}'); background-size: cover; background-position: center;` : ''}">
                        ${!imgUrl ? `<div style="text-align:center"><div class="case-emoji">${cs.emoji || '🎨'}</div><div class="case-cat-small">${cat}</div></div>` : ''}
                    </div>
                    <div class="case-body">
                        <div class="case-tag-label">${cat}</div>
                        <div class="case-title">${title}</div>
                        <div class="case-desc">${desc}</div>
                        <div class="case-footer">
                            <div class="case-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        } catch (err) {
            console.error("Error Work:", err);
        }
    }

    document.addEventListener('DOMContentLoaded', renderWorkGrid);
  </script>
</body>
</html>
