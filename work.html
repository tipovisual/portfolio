<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Work — Freddy Gonzalez</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="work.html" class="active">Work</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle(); location.reload();">ES</button></li>
    </ul>
  </nav>

  <main class="container section-pad">
    <h1 class="section-title">Portfolio</h1>
    <div class="cases-grid" id="workGrid" style="margin-top:4rem"></div>
  </main>

  <script type="module">
  import { supabase } from './js/supabase-config.js';

  async function renderWork() {
    if (!window.Lang) {
      setTimeout(renderWork, 100);
      return;
    }

    const lang = window.Lang.current;
    const grid = document.getElementById('workGrid');
    
    try {
      const { data: projects, error } = await supabase
        .from('portfolio_projects')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) throw error;
      
      grid.innerHTML = '';
      projects.forEach(cs => {
        const title = cs.title[lang] || cs.title['es'];
        const description = cs.description[lang] || cs.description['es'];
        const category = (cs.category[lang] || cs.category['es']).toUpperCase();
        const image = cs.image_url || '';

        const card = document.createElement('a');
        card.href = `case.html?id=${cs.slug}`;
        card.className = 'case-card';
        card.innerHTML = `
          <div class="case-img" style="background-image: url('${image}'); background-size: cover; background-position: center;">
            ${!image ? `<div class="case-emoji">${cs.emoji}</div>` : ''}
          </div>
          <div class="case-body">
            <div class="case-tag-label">${category}</div>
            <div class="case-title">${title}</div>
            <div class="case-desc">${description}</div>
            <div class="case-footer">
               <div class="case-arrow">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
               </div>
            </div>
          </div>`;
        grid.appendChild(card);
      });
    } catch (err) {
      console.error("Error en galería:", err);
    }
  }

  document.addEventListener('DOMContentLoaded', renderWork);
</script>
</body>
</html>
