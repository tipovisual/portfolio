<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Work — Freddy Gonzalez</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="work.html" class="active">Work</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle(); location.reload();">ES</button></li>
    </ul>
  </nav>

  <main class="container section-pad">
    <h1 class="section-title">Portfolio</h1>
    <div class="cases-grid" id="workGrid" style="margin-top:4rem"></div>
  </main>

  <script src="js/i18n.js"></script>
  <script type="module">
    import { supabase } from './js/supabase-config.js';

    async function render() {
        const i18n = window.Lang;
        if (!i18n) { setTimeout(render, 100); return; }
        const lang = i18n.current;
        const grid = document.getElementById('workGrid');

        try {
            const { data: projects, error } = await supabase.from('portfolio_projects').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            grid.innerHTML = '';
            projects.forEach(cs => {
                const title = cs.title?.[lang] || cs.title?.['es'] || 'Untitled';
                const desc = cs.description?.[lang] || cs.description?.['es'] || '';
                const img = cs.image_url || cs.meta?.cover || '';
                const category = (cs.category?.[lang] || cs.category?.['es'] || 'CASE STUDY').toUpperCase();

                const card = document.createElement('a');
                card.href = `case.html?id=${cs.slug}`;
                card.className = 'case-card';
                card.innerHTML = `
                    <div class="case-img" style="${img ? `background-image:url('${img}');background-size:cover;background-position:center;` : 'background:var(--surface2)'}">
                        ${!img ? `<div class="case-emoji">${cs.emoji || '🎨'}</div>` : ''}
                    </div>
                    <div class="case-body">
                        <div class="case-tag-label">${category}</div>
                        <div class="case-title">${title}</div>
                        <div class="case-desc">${desc}</div>
                    </div>`;
                grid.appendChild(card);
            });
        } catch (e) { console.error(e); }
    }
    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
