<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Work — Freddy Gonzalez</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="work.html" class="active">Work</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle(); location.reload();">ES</button></li>
    </ul>
  </nav>

  <main class="container section-pad">
    <h1 class="section-title">Portfolio</h1>
    <div class="cases-grid" id="workGrid" style="margin-top:4rem"></div>
  </main>

  <script src="js/i18n.js"></script>
  <script type="module">
    import { supabase } from './js/supabase-config.js';

    async function renderAll() {
      const grid = document.getElementById('workGrid');
      const lang = (window.Lang && window.Lang.current) ? window.Lang.current : 'es';

      try {
        const { data, error } = await supabase
          .from('portfolio_projects')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        grid.innerHTML = data.map(cs => {
          const t = cs.title?.[lang] || cs.title?.['es'] || 'Untitled';
          const d = cs.description?.[lang] || cs.description?.['es'] || '';
          const img = cs.image_url || cs.meta?.cover || '';
          const cat = (cs.category?.[lang] || cs.category?.['es'] || 'CASE STUDY').toUpperCase();

          return `
            <a href="case.html?id=${cs.slug}" class="case-card">
              <div class="case-img" style="${img ? `background-image:url('${img}');background-size:cover;` : 'background:var(--surface2)'}">
                ${!img ? `<div class="case-emoji">${cs.emoji || '🎨'}</div>` : ''}
              </div>
              <div class="case-body">
                <div class="case-tag-label">${cat}</div>
                <div class="case-title">${t}</div>
                <div class="case-desc">${d}</div>
              </div>
            </a>`;
        }).join('');
      } catch (e) {
        console.error("Error en galería:", e);
      }
    }
    renderAll();
  </script>
</body>
</html>
