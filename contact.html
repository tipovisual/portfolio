<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Freddy González</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Estilos específicos para la sección de contacto Premium */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 6rem;
      align-items: start;
    }

    .contact-info h1 {
      font-size: clamp(3.5rem, 8vw, 6rem);
      line-height: 0.9;
      margin-bottom: 2.5rem;
    }

    .contact-method {
      margin-top: 4rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .method-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .method-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .method-value {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--white);
      text-decoration: none;
      transition: color 0.3s;
    }

    .method-value:hover {
      color: var(--accent3);
    }

    /* Formulario Estilizado */
    .contact-form-container {
      background: var(--surface2);
      padding: 4rem;
      border-radius: 32px;
      border: 1px solid var(--border);
    }

    .form-group {
      margin-bottom: 2rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1.2rem;
      border-radius: 12px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface);
    }

    textarea.form-input {
      min-height: 150px;
      resize: vertical;
    }

    #form-status {
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      display: none;
    }

    #form-status.success {
      display: block;
      background: rgba(106, 247, 200, 0.1);
      color: var(--accent3);
      border: 1px solid rgba(106, 247, 200, 0.2);
    }

    @media (max-width: 900px) {
      .contact-grid { grid-template-columns: 1fr; gap: 4rem; }
      .contact-form-container { padding: 2rem; }
    }
  </style>
</head>
<body>

  <nav>
  <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
    <a href="index.html" class="nav-logo">Freddy Gonzalez</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" data-i18n="nav.home">Home</a></li>
      <li><a href="about.html" data-i18n="nav.about">About</a></li>
      <li><a href="work.html" data-i18n="nav.work">Work</a></li>
      <li><button class="lang-btn" onclick="Lang.toggle()" id="langBtn">ES</button></li>
    </ul>
    <button class="nav-mobile-btn" onclick="toggleMenu()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</nav>

  <main class="container section-pad" style="padding-top:12rem">
    <div class="contact-grid">
      
      <!-- LADO IZQUIERDO: TEXTO Y LINKS -->
      <div class="contact-info">
        <div class="section-label" data-i18n="contact.label">Contacto</div>
        <h1 class="serif" data-i18n="contact.title">Let’s start a conversation.</h1>
        <p class="section-sub" data-i18n="contact.sub">¿Tienes un reto complejo o una idea disruptiva? Estoy listo para ayudar a tu equipo a escalar.</p>
        
        <div class="contact-method">
          <div class="method-item">
            <span class="method-label">LinkedIn</span>
            <a href="https://linkedin.com/in/freddy-gonzalez-13a13a3a/" target="_blank" class="method-value">Freddy González</a>
          </div>
          <div class="method-item">
            <span class="method-label" data-i18n="contact.location">Location</span>
            <span class="method-value">Panamá, Ciudad de Panamá</span>
          </div>
        </div>
      </div>

      <!-- LADO DERECHO: FORMULARIO -->
      <div class="contact-form-container">
        <div id="form-status"></div>
        
        <form id="contactForm">
          <!-- Honeypot para evitar spam (invisible para el usuario) -->
          <input type="text" name="_honey" style="display:none">
          
          <div class="form-group">
            <label data-i18n="contact.name">Nombre</label>
            <input type="text" name="name" class="form-input" placeholder="Your Name" required>
          </div>

          <div class="form-group">
            <label data-i18n="contact.emailField">Email</label>
            <input type="email" name="email" class="form-input" placeholder="email@example.com" required>
          </div>

          <div class="form-group">
            <label data-i18n="contact.message">Mensaje</label>
            <textarea name="message" class="form-input" placeholder="Tell me about your project..." required></textarea>
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%; justify-content:center; padding:1.2rem">
            <span data-i18n="contact.send">Enviar Mensaje</span>
          </button>
        </form>
      </div>

    </div>
  </main>

  <!-- REPETIMOS FOOTER PRO PARA CONSISTENCIA -->
  <footer class="main-footer">
    <div class="container">
        <div class="footer-bottom">
            <div class="footer-info">
                <span class="nav-logo">Freddy Gonzalez</span>
                <span class="mono" style="font-size: 0.7rem; color: var(--muted);" data-i18n="footer.copy">© 2024 — HANDCRAFTED IN PANAMA</span>
            </div>
            <div class="footer-social">
                <a href="https://linkedin.com/in/freddy-gonzalez-13a13a3a/" target="_blank" class="mono" style="font-size: 0.7rem; margin-left: 2rem;">LINKEDIN</a>
                <a href="mailto:tipovisual@gmail.com" class="mono" style="font-size: 0.7rem; margin-left: 2rem;">EMAIL</a>
            </div>
        </div>
    </div>
  </footer>

  <script src="js/i18n.js"></script>
  <script>
    const contactForm = document.getElementById('contactForm');
    const statusDiv = document.getElementById('form-status');
    const submitBtn = document.getElementById('submitBtn');

    contactForm.onsubmit = async (e) => {
      e.preventDefault();
      
      // Feedback visual
      submitBtn.disabled = true;
      submitBtn.innerText = Lang.current === 'es' ? 'Enviando...' : 'Sending...';

      // Datos del formulario
      const formData = new FormData(contactForm);
      const data = Object.fromEntries(formData.entries());

      try {
        // El email fredevelper@gmail.com solo vive aquí en el script, no en el HTML visible
        const response = await fetch("https://formsubmit.co/ajax/fredevelper@gmail.com", {
          method: "POST",
          headers: { 
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          statusDiv.innerText = Lang.get('contact.success');
          statusDiv.className = 'success';
          statusDiv.style.display = 'block';
          contactForm.reset();
        } else {
          throw new Error();
        }
      } catch (err) {
        statusDiv.innerText = "Error: Please try again later.";
        statusDiv.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = Lang.get('contact.send');
      }
    };

    window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10));
  </script>
</body>
</html>
